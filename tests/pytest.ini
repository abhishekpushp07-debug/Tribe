[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Pure function tests (no DB, no network)
    integration: API endpoint tests (requires running server + DB)
    smoke: End-to-end flow tests (requires full stack)
addopts = -v --tb=short -q --ignore=tests/archive
